<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kanban — Digital Twin</title>
<link rel="stylesheet" href="./styles/style.css"/>
<link rel="stylesheet" href="./styles/twin.css"/>
<style>
.board { flex: 1; display: flex; gap: 14px; padding: 20px 24px; overflow-x: auto; align-items: flex-start; }
.col {
  min-width: 240px; width: 240px; flex-shrink: 0;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
  max-height: calc(100vh - 120px); overflow-y: auto;
}
.col-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
}
.col-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.col-count {
  margin-left: auto; background: rgba(255,255,255,0.07);
  border-radius: 10px; padding: 1px 7px; font-size: 10px; color: var(--muted);
}
.card-item {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; margin-bottom: 8px;
  cursor: grab; transition: all 0.2s; position: relative;
}
.card-item:active { cursor: grabbing; }
.card-item.dragging { opacity: 0.4; transform: scale(0.97); }
.card-item:hover { border-color: var(--accent); box-shadow: var(--glow); }
.card-item.drop-target { border-color: var(--purple); background: rgba(123,47,255,0.08); }
.card-title-txt { font-size: 13px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
.card-desc { font-size: 11px; color: var(--muted); margin-bottom: 8px; line-height: 1.4; max-height: 48px; overflow: hidden; }
.card-footer { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.pri-dot { width: 7px; height: 7px; border-radius: 50%; }
.card-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
.card-item:hover .card-actions { opacity: 1; }
.icon-btn {
  width: 22px; height: 22px; border-radius: 4px; border: none; cursor: pointer;
  font-size: 11px; display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,0.06); color: var(--muted); transition: all 0.15s;
}
.icon-btn:hover { background: rgba(0,212,255,0.15); color: var(--accent); }
.icon-btn.del:hover { background: rgba(255,68,102,0.15); color: var(--red); }
.col.drag-over { background: rgba(0,212,255,0.04); border-color: var(--accent); }

/* Add card inline */
.add-card-btn {
  width: 100%; padding: 7px; border-radius: 7px; font-size: 12px; color: var(--muted);
  background: none; border: 1px dashed rgba(255,255,255,0.1); cursor: pointer; margin-top: 4px;
  transition: all 0.15s;
}
.add-card-btn:hover { border-color: var(--accent); color: var(--accent); }
.add-form { display: none; margin-top: 8px; }
.add-form.show { display: block; }
.add-form .input { font-size: 12px; margin-bottom: 6px; }
.add-form-btns { display: flex; gap: 6px; }

/* Hermes stream panel */
.hermes-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(8,12,20,0.88); backdrop-filter: blur(8px);
  z-index: 400; align-items: center; justify-content: center;
}
.hermes-overlay.show { display: flex; }
.hermes-panel {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; width: 680px; max-width: 95vw;
  max-height: 80vh; display: flex; flex-direction: column;
}
.hermes-header {
  padding: 18px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.hermes-log {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  font-family: var(--font-mono); font-size: 12px; line-height: 1.7;
  color: #8be; white-space: pre-wrap; background: #060a10;
}
.hermes-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }

/* Board toolbar */
.board-toolbar {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 24px; border-bottom: 1px solid var(--border);
}
</style>
</head>
<body>
<div class="page">
<nav class="top-nav">
  <span class="nav-logo">&#9670; LUCIFER</span>
  <a href="index.html" class="nav-link">Home</a>
  <a href="twin.html" class="nav-link">Twin</a>
  <a href="kanban.html" class="nav-link active">Kanban</a>
  <a href="brain.html" class="nav-link">Brain</a>
  <div class="nav-spacer"></div>
  <span id="backend-pill" class="status-pill offline" onclick="openConfigModal()" style="cursor:pointer">
    <div class="status-dot"></div> Connecting...
  </span>
</nav>

<div id="offline-banner">Twin service offline. <a href="#" onclick="openConfigModal()" style="color:inherit">Configure backend URL</a></div>

<div class="board-toolbar">
  <span style="font-size:16px;font-weight:700">Task Board</span>
  <button class="btn btn-primary btn-sm" onclick="openNewTask()">+ New Task</button>
  <span style="font-size:11px;color:var(--muted)">Drag cards between columns &bull; Click <b>⚡</b> to run with Hermes</span>
</div>

<div class="board" id="board"></div>
</div>

<!-- Hermes stream overlay -->
<div id="hermes-overlay" class="hermes-overlay">
  <div class="hermes-panel">
    <div class="hermes-header">
      <div class="avatar" style="width:32px;height:32px;font-size:14px">L</div>
      <div>
        <div style="font-weight:700">Hermes Execution</div>
        <div id="hermes-task-title" style="font-size:11px;color:var(--muted)"></div>
      </div>
      <div class="nav-spacer"></div>
      <div id="hermes-status" class="tag tag-yellow">Running…</div>
    </div>
    <div class="hermes-log" id="hermes-log">Connecting to Hermes agent…&#10;</div>
    <div class="hermes-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeHermes()">Close</button>
    </div>
  </div>
</div>

<!-- New task modal -->
<div id="new-task-modal" class="modal-overlay">
  <div class="modal">
    <h3 class="glow-text">New Task</h3>
    <label>Title</label>
    <input class="input" id="nt-title" placeholder="Task title…"/>
    <label>Description</label>
    <textarea class="input" id="nt-desc" rows="3" placeholder="Details…" style="resize:vertical"></textarea>
    <label>Priority</label>
    <select class="input" id="nt-pri">
      <option value="low">Low</option>
      <option value="medium" selected>Medium</option>
      <option value="high">High</option>
    </select>
    <label>Column</label>
    <select class="input" id="nt-col">
      <option value="backlog">Backlog</option>
      <option value="assigned">Assign to Twin</option>
      <option value="in_progress">In Progress</option>
    </select>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeNewTask()">Cancel</button>
      <button class="btn btn-primary" onclick="createTask()">Create</button>
    </div>
  </div>
</div>

<!-- Config modal -->
<div id="config-modal" class="modal-overlay">
  <div class="modal">
    <h3 class="glow-text">Backend Configuration</h3>
    <label>Twin Service URL</label>
    <input class="input" id="backend-url-input" placeholder="http://localhost:8080"/>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeConfigModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveConfig()">Save</button>
    </div>
  </div>
</div>

<script src="./scripts/config.js"></script>
<script>
const COLS = [
  { id: 'backlog',     label: 'Backlog',          color: '#5a7090' },
  { id: 'assigned',   label: 'Assigned to Twin',  color: '#00d4ff' },
  { id: 'in_progress',label: 'In Progress',        color: '#7b2fff' },
  { id: 'review',     label: 'Review',             color: '#ffd060' },
  { id: 'done',       label: 'Done',               color: '#00ff88' },
];
const PRI = { high:'#ff4466', medium:'#ffd060', low:'#00ff88' };

let tasks = [];
let dragId = null;

// ── Board rendering ──────────────────────────────────────────────────────────
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  COLS.forEach(col => {
    const colEl = document.createElement('div');
    colEl.className = 'col';
    colEl.dataset.col = col.id;
    const colTasks = tasks.filter(t => t.status === col.id);
    colEl.innerHTML = `
      <div class="col-header">
        <div class="col-dot" style="background:${col.color}"></div>
        ${col.label}
        <span class="col-count">${colTasks.length}</span>
      </div>
      <div class="cards-wrap"></div>
      <button class="add-card-btn" onclick="quickAdd('${col.id}')">+ Add card</button>
      <div class="add-form" id="form-${col.id}">
        <input class="input" id="quick-title-${col.id}" placeholder="Task title…" onkeydown="if(event.key==='Enter')quickSubmit('${col.id}')"/>
        <div class="add-form-btns">
          <button class="btn btn-primary btn-sm" onclick="quickSubmit('${col.id}')">Add</button>
          <button class="btn btn-ghost btn-sm" onclick="quickCancel('${col.id}')">Cancel</button>
        </div>
      </div>`;

    const wrap = colEl.querySelector('.cards-wrap');
    colTasks.forEach(t => {
      const card = makeCard(t);
      wrap.appendChild(card);
    });

    // Drag-over events
    colEl.addEventListener('dragover', e => { e.preventDefault(); colEl.classList.add('drag-over'); });
    colEl.addEventListener('dragleave', () => colEl.classList.remove('drag-over'));
    colEl.addEventListener('drop', e => {
      e.preventDefault(); colEl.classList.remove('drag-over');
      if (dragId) moveTask(dragId, col.id);
    });

    board.appendChild(colEl);
  });
}

function makeCard(t) {
  const el = document.createElement('div');
  el.className = 'card-item';
  el.draggable = true;
  el.dataset.id = t.id;
  el.innerHTML = `
    <div class="card-actions">
      ${t.status !== 'done' ? `<button class="icon-btn" title="Run with Hermes" onclick="runHermes('${t.id}','${escHtml(t.title)}')">&#9889;</button>` : ''}
      <button class="icon-btn del" title="Delete" onclick="delTask('${t.id}')">&#10005;</button>
    </div>
    <div class="card-title-txt">${escHtml(t.title)}</div>
    ${t.desc ? `<div class="card-desc">${escHtml(t.desc)}</div>` : ''}
    <div class="card-footer">
      <div class="pri-dot" style="background:${PRI[t.priority]||PRI.medium}" title="${t.priority} priority"></div>
      ${t.tags ? t.tags.split(',').filter(Boolean).map(g=>`<span class="tag tag-accent" style="font-size:9px;padding:1px 5px">${escHtml(g.trim())}</span>`).join('') : ''}
      <span style="font-size:9px;color:var(--muted);margin-left:auto">${t.id}</span>
    </div>`;
  el.addEventListener('dragstart', () => { dragId = t.id; el.classList.add('dragging'); });
  el.addEventListener('dragend', () => { dragId = null; el.classList.remove('dragging'); });
  return el;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Task CRUD ────────────────────────────────────────────────────────────────
async function loadTasks() {
  try {
    const res = await fetch(getBackend() + '/api/tasks');
    tasks = await res.json();
    buildBoard();
  } catch { buildBoard(); }  // empty board if offline
}

async function createTask() {
  const title = document.getElementById('nt-title').value.trim();
  if (!title) return;
  const body = {
    title, desc: document.getElementById('nt-desc').value,
    priority: document.getElementById('nt-pri').value,
    status: document.getElementById('nt-col').value,
  };
  try {
    await fetch(getBackend() + '/api/tasks', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    closeNewTask();
    loadTasks();
  } catch { alert('Backend offline'); }
}

async function moveTask(id, status) {
  try {
    await fetch(getBackend() + `/api/tasks/${id}`, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({status})
    });
    loadTasks();
  } catch {}
}

async function delTask(id) {
  if (!confirm('Delete this task?')) return;
  try {
    await fetch(getBackend() + `/api/tasks/${id}`, { method:'DELETE' });
    loadTasks();
  } catch {}
}

// ── Quick-add inline ─────────────────────────────────────────────────────────
function quickAdd(colId) {
  document.getElementById(`form-${colId}`).className = 'add-form show';
  document.getElementById(`quick-title-${colId}`).focus();
}
function quickCancel(colId) { document.getElementById(`form-${colId}`).className = 'add-form'; }
async function quickSubmit(colId) {
  const inp = document.getElementById(`quick-title-${colId}`);
  const title = inp.value.trim();
  if (!title) return;
  try {
    await fetch(getBackend() + '/api/tasks', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ title, status: colId, priority: 'medium' })
    });
    inp.value = '';
    quickCancel(colId);
    loadTasks();
  } catch { alert('Backend offline'); }
}

// ── New task modal ────────────────────────────────────────────────────────────
function openNewTask() { document.getElementById('new-task-modal').className = 'modal-overlay show'; }
function closeNewTask() { document.getElementById('new-task-modal').className = 'modal-overlay'; }

// ── Hermes execution ──────────────────────────────────────────────────────────
function runHermes(id, title) {
  const overlay = document.getElementById('hermes-overlay');
  const log = document.getElementById('hermes-log');
  document.getElementById('hermes-task-title').textContent = title;
  document.getElementById('hermes-status').textContent = 'Running…';
  document.getElementById('hermes-status').className = 'tag tag-yellow';
  log.textContent = 'Starting Hermes agent…\n';
  overlay.className = 'hermes-overlay show';

  fetch(getBackend() + '/api/hermes', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ task_id: id, task: title })
  }).then(() => {
    const es = new EventSource(getBackend() + `/api/hermes/${id}`);
    es.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'line') {
        log.textContent += msg.content + '\n';
        log.scrollTop = log.scrollHeight;
      } else if (msg.type === 'done') {
        document.getElementById('hermes-status').textContent = 'Done';
        document.getElementById('hermes-status').className = 'tag tag-green';
        es.close(); loadTasks();
      } else if (msg.type === 'error') {
        log.textContent += '\n[ERROR] ' + msg.content;
        document.getElementById('hermes-status').textContent = 'Error';
        document.getElementById('hermes-status').className = 'tag tag-red';
        es.close();
      }
    };
    es.onerror = () => {
      log.textContent += '\n[Connection lost]';
      document.getElementById('hermes-status').textContent = 'Disconnected';
      es.close();
    };
  }).catch(err => {
    log.textContent += '\n[Failed to start: ' + err + ']';
    document.getElementById('hermes-status').textContent = 'Error';
    document.getElementById('hermes-status').className = 'tag tag-red';
  });
}

function closeHermes() { document.getElementById('hermes-overlay').className = 'hermes-overlay'; }

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  updateStatusBanner().then(() => loadTasks());
  setInterval(() => { updateStatusBanner(); loadTasks(); }, 15000);
});
</script>
</body>
</html>
